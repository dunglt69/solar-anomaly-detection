<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Real-time solar PV monitoring, fault detection, and analytics dashboard for ĐHBK Hà Nội." />
    <meta name="theme-color" content="#0f172a" />
    <title>EnergiaMind — Solar Monitoring Platform</title>
    <script>
      (function() {
        const theme = localStorage.getItem('em_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <style>
      /* App loading spinner (before React hydrates) */
      .app-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0F172A;
      }
      .app-loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(59, 130, 246, 0.15);
        border-top-color: #3B82F6;
        border-radius: 50%;
        animation: spin 800ms linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  </head>
  <body>
    <div id="root">
      <div class="app-loading"><div class="app-loading-spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
